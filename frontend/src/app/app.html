<div class="flex h-screen bg-gray-50 overflow-hidden">

  <!-- Sidebar -->
  <aside
    class="flex flex-col bg-gray-900 text-white transition-all duration-300 shrink-0"
    [class.w-64]="!isCollapsed"
    [class.w-16]="isCollapsed"
  >
    <!-- Logo -->
    <div class="flex items-center h-16 px-4 bg-gray-950 overflow-hidden">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 shrink-0 text-blue-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8" d="M3 10l9-5 9 5-9 5-9-5z" />
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8" d="M6 12.5V16a6 3 0 0012 0v-3.5" />
      </svg>
      @if (!isCollapsed) {
        <span class="ml-3 font-semibold text-lg whitespace-nowrap">Transfer App</span>
      }
    </div>

    <!-- Navigation -->
    <nav class="flex-1 px-2 py-4 space-y-1">
      <a
        routerLink="/transfers"
        routerLinkActive="!bg-blue-600 !text-white"
        class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-gray-300 hover:bg-gray-700 hover:text-white transition-colors"
      >
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 6h11M9 12h11M9 18h11M5 6h.01M5 12h.01M5 18h.01" />
        </svg>
        @if (!isCollapsed) {
          <span class="text-sm font-medium whitespace-nowrap">Historique</span>
        }
      </a>
      <a
        routerLink="/transfers/new"
        routerLinkActive="!bg-blue-600 !text-white"
        class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-gray-300 hover:bg-gray-700 hover:text-white transition-colors"
      >
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 5v14m-7-7h14" />
        </svg>
        @if (!isCollapsed) {
          <span class="text-sm font-medium whitespace-nowrap">Nouveau Virement</span>
        }
      </a>
    </nav>
  </aside>

  <!-- Main area -->
  <div class="flex flex-col flex-1 overflow-hidden">

    <!-- Header -->
    <header class="flex items-center h-16 bg-white border-b border-gray-200 px-6 shrink-0">
      <button
        (click)="isCollapsed = !isCollapsed"
        class="p-2 rounded-lg text-gray-500 hover:bg-gray-100 hover:text-gray-700 transition-colors"
        title="Afficher/masquer le menu"
      >
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
        </svg>
      </button>
      <span class="ml-4 text-gray-700 font-semibold">Gestion des Virements</span>
    </header>

    <!-- Content -->
    <main class="flex-1 overflow-auto p-6">
      <router-outlet></router-outlet>
    </main>

  </div>
</div>

<!-- Toast notifications -->
<div class="fixed bottom-4 right-4 z-50 flex flex-col gap-2 max-w-sm w-full">
  @for (toast of toastService.toasts(); track toast.id) {
    <div
      class="flex items-center gap-3 px-4 py-3 rounded-xl shadow-lg border text-sm font-medium"
      [class.bg-green-50]="toast.type === 'success'"
      [class.border-green-200]="toast.type === 'success'"
      [class.text-green-800]="toast.type === 'success'"
      [class.bg-red-50]="toast.type === 'error'"
      [class.border-red-200]="toast.type === 'error'"
      [class.text-red-800]="toast.type === 'error'"
      [class.bg-yellow-50]="toast.type === 'warning'"
      [class.border-yellow-200]="toast.type === 'warning'"
      [class.text-yellow-800]="toast.type === 'warning'"
    >
      <span class="h-2.5 w-2.5 rounded-full shrink-0"
            [class.bg-green-600]="toast.type === 'success'"
            [class.bg-red-600]="toast.type === 'error'"
            [class.bg-yellow-600]="toast.type === 'warning'"></span>
      <span class="flex-1">{{ toast.message }}</span>
      <button
        (click)="toastService.remove(toast.id)"
        class="opacity-50 hover:opacity-100 transition-opacity ml-1 text-sm"
        aria-label="Fermer la notification"
      >X</button>
    </div>
  }
</div>
